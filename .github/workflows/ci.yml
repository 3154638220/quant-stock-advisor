name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ scripts/ tests/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports --show-error-codes || true

      - name: Test with pytest
        run: pytest --cov=src --cov-fail-under=75 --cov-report=term-missing

      - name: Smoke test imports
        run: |
          python -c "from src.pipeline.monthly_dataset import build_monthly_selection_dataset"
          python -c "from src.data_fetcher.db_manager import DuckDBManager"
          python -c "from src.features.ic_monitor import ICMonitor"
