name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install "ruff>=0.11.0"

      - name: Lint with ruff
        run: python -m ruff check src/ scripts/ tests/

      - name: Type check with mypy
        run: python -m mypy src/ --ignore-missing-imports --show-error-codes | tee mypy-output.txt || true
        continue-on-error: true

      - name: Test with pytest
        run: python -m pytest --cov=src --cov-fail-under=56 --cov-report=term-missing

      - name: Check script sizes (>200 lines warning)
        run: |
          echo "Scripts exceeding 200 lines (target: <200):"
          find scripts/ -name "run_*.py" -exec wc -l {} + | awk '$1 > 200 {printf "  %s: %d lines\n", $2, $1}' || true
          echo "See docs/plan-05-05 B4 for script slimming plan."

      - name: Smoke test imports
        run: |
          python -c "from src.pipeline.monthly_dataset import build_monthly_selection_dataset"
          python -c "from src.data_fetcher.db_manager import DuckDBManager"
          python -c "from src.features.ic_monitor import ICMonitor"
